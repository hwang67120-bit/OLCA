spring:
  application:
    name: OLCA
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      chat:
        options:
          model: ${OLLAMA_MODEL}
          temperature: 0.7

vtuber:
  websocket:
    url: ${VTUBER_WEBSOCKET_URL}

server:
  port: 8080